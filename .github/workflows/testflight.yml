name: Build & Deploy to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build Autumn iOS to TestFlight
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          sudo xcode-select -switch /Applications/Xcode_16.app
          xcodebuild -version

      - name: Install App Store Connect API key
        env:
          ASC_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$ASC_KEY_CONTENT" > ~/.appstoreconnect/private_keys/AuthKey_P6Z72KS63T.p8
          head -1 ~/.appstoreconnect/private_keys/AuthKey_P6Z72KS63T.p8
          wc -c ~/.appstoreconnect/private_keys/AuthKey_P6Z72KS63T.p8

      - name: List available schemes
        run: |
          xcodebuild -list 2>/dev/null || swift package describe || echo "listing schemes..."

      - name: Resolve SPM dependencies
        run: swift package resolve

      - name: Build and archive
        env:
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -scheme AutumnApp \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/Autumn.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_P6Z72KS63T.p8" \
            -authenticationKeyID "P6Z72KS63T" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=L7AHWS9Q6V \
            PRODUCT_BUNDLE_IDENTIFIER=DART-Meadow-LLC.Autumn

      - name: Export IPA
        env:
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          cat > /tmp/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>L7AHWS9Q6V</string>
            <key>signingStyle</key><string>automatic</string>
            <key>uploadBitcode</key><false/>
            <key>uploadSymbols</key><true/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Autumn.xcarchive" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_P6Z72KS63T.p8" \
            -authenticationKeyID "P6Z72KS63T" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload to TestFlight
        env:
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          IPA=$(find $RUNNER_TEMP/export -name '*.ipa' | head -1)
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "P6Z72KS63T" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --verbose

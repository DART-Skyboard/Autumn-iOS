name: Build & Deploy to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build Autumn iOS to TestFlight
    runs-on: macos-14
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: |
          sudo xcode-select -switch /Applications/Xcode_15.4.app
          xcodebuild -version

      - name: Install App Store Connect API key
        env:
          ASC_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$ASC_KEY_CONTENT" > ~/.appstoreconnect/private_keys/AuthKey_P6Z72KS63T.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_P6Z72KS63T.p8
          head -1 ~/.appstoreconnect/private_keys/AuthKey_P6Z72KS63T.p8

      - name: Generate certificate via ASC API
        env:
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          pip3 install PyJWT cryptography --break-system-packages -q
          openssl genrsa -out /tmp/dist_key.pem 2048
          openssl req -new -key /tmp/dist_key.pem -out /tmp/dist_csr.pem -subj "/C=US/O=DART Meadow LLC/CN=Autumn Distribution"
          python3 scripts/create_cert.py
          openssl x509 -inform DER -in /tmp/dist_cert.der -out /tmp/dist_cert.pem
          openssl pkcs12 -export -in /tmp/dist_cert.pem -inkey /tmp/dist_key.pem -out /tmp/dist.p12 -passout pass:temppass -legacy
          echo "p12 size: $(wc -c < /tmp/dist.p12) bytes"

      - name: Import certificate to keychain
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "keychainpass" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "keychainpass" "$KEYCHAIN_PATH"
          security import /tmp/dist.p12 -k "$KEYCHAIN_PATH" -P temppass -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -k "keychainpass" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Resolve SPM dependencies
        run: swift package resolve

      - name: Build and archive
        env:
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          security unlock-keychain -p "keychainpass" $RUNNER_TEMP/signing.keychain-db
          xcodebuild archive \
            -scheme AutumnApp \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/Autumn.xcarchive" \
            -allowProvisioningUpdates \
            -allowProvisioningDeviceRegistration \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_P6Z72KS63T.p8" \
            -authenticationKeyID "P6Z72KS63T" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/signing.keychain-db" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=L7AHWS9Q6V \
            PRODUCT_BUNDLE_IDENTIFIER=DART-Meadow-LLC.Autumn

      - name: Export IPA
        env:
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          security unlock-keychain -p "keychainpass" $RUNNER_TEMP/signing.keychain-db
          cat > /tmp/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>L7AHWS9Q6V</string>
            <key>signingStyle</key><string>automatic</string>
            <key>uploadBitcode</key><false/>
            <key>uploadSymbols</key><true/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Autumn.xcarchive" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_P6Z72KS63T.p8" \
            -authenticationKeyID "P6Z72KS63T" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload to TestFlight
        env:
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          IPA=$(find $RUNNER_TEMP/export -name '*.ipa' | head -1)
          xcrun altool --upload-app --type ios --file "$IPA" --apiKey "P6Z72KS63T" --apiIssuer "$ASC_ISSUER_ID" --verbose

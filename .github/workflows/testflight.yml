name: Build & Deploy to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build Autumn iOS to TestFlight
    runs-on: macos-14
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Select Xcode 15.4
        run: |
          sudo xcode-select -switch /Applications/Xcode_15.4.app
          xcodebuild -version

      - name: Install App Store Connect API key
        env:
          ASC_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$ASC_KEY_CONTENT" > ~/.appstoreconnect/private_keys/AuthKey_P6Z72KS63T.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_P6Z72KS63T.p8

      - name: Install Tuist
        run: |
          curl -Ls https://install.tuist.io | bash

      - name: Resolve Tuist dependencies
        run: tuist install

      - name: Generate Xcode project with Tuist
        run: tuist generate --no-open

      - name: Setup signing keychain
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "keychainpass" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "keychainpass" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "keychainpass" "$KEYCHAIN_PATH" 2>/dev/null || true
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Install Bundler and Gems
        run: |
          gem install bundler
          bundle install

      - name: Run Fastlane beta lane
        env:
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          KEYCHAIN_PASSWORD: "keychainpass"
        run: bundle exec fastlane beta | tee build_log.txt

      - name: Report failure
        if: failure()
        run: |
          mkdir -p reports
          TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
          echo -e "\n---\n## [$TIMESTAMP] - BUILD FAILED" >> reports/DIAGNOSTIC_REPORT.txt
          echo -e "### LOG SUMMARY (LAST 20 LINES):" >> reports/DIAGNOSTIC_REPORT.txt
          tail -n 20 build_log.txt >> reports/DIAGNOSTIC_REPORT.txt || echo "No log captured." >> reports/DIAGNOSTIC_REPORT.txt
          echo -e "\nDetailed logs are available in the GitHub Actions run summary." >> reports/DIAGNOSTIC_REPORT.txt

          git config --global user.name "Autumn CI"
          git config --global user.email "ci@leatr.xyz"
          git add reports/DIAGNOSTIC_REPORT.txt
          git commit -m "chore: log build failure to diagnostic report [skip ci]" || true
          git push origin main || true

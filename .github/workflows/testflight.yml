name: Build & Deploy to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build Autumn iOS to TestFlight
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: |
          sudo xcode-select -switch /Applications/Xcode_15.4.app
          xcodebuild -version
          xcodebuild -showsdks | grep iphoneos

      - name: Install App Store Connect API key
        env:
          ASC_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$ASC_KEY_CONTENT" > ~/.appstoreconnect/private_keys/AuthKey_P6Z72KS63T.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_P6Z72KS63T.p8
          KEY_SIZE=$(wc -c < ~/.appstoreconnect/private_keys/AuthKey_P6Z72KS63T.p8)
          echo "API key: $KEY_SIZE bytes"
          [ "$KEY_SIZE" -lt 100 ] && echo "ERROR: empty" && exit 1 || true

      - name: Setup keychain and install provisioning profile
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KP="${KEYCHAIN_PASSWORD:-keychainpass}"
          security create-keychain -p "$KP" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KP" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KP" "$KEYCHAIN_PATH" 2>/dev/null || true

          if [ -n "$PROVISIONING_PROFILE_BASE64" ]; then
            PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
            echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
            echo "Profile size: $(wc -c < $PP_PATH) bytes"
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            PP_UUID=$(security cms -D -i "$PP_PATH" 2>/dev/null | plutil -extract UUID raw - 2>/dev/null || true)
            echo "Profile UUID: $PP_UUID"
            if [ -n "$PP_UUID" ]; then
              cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID.mobileprovision"
              echo "PROFILE_UUID=$PP_UUID" >> $GITHUB_ENV
            else
              cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/AutumnApp.mobileprovision
              echo "PROFILE_UUID=" >> $GITHUB_ENV
            fi
          fi

      - name: Install xcodegen 2.42.0
        run: |
          curl -L "https://github.com/yonaskolb/XcodeGen/releases/download/2.42.0/xcodegen.zip" \
            -o /tmp/xcodegen.zip
          unzip -o /tmp/xcodegen.zip -d /tmp/xcodegen_bin
          sudo cp /tmp/xcodegen_bin/xcodegen/bin/xcodegen /usr/local/bin/xcodegen
          sudo chmod +x /usr/local/bin/xcodegen
          xcodegen version

      - name: Generate Xcode project
        run: |
          xcodegen generate --spec project.yml
          grep -m1 "objectVersion" Autumn.xcodeproj/project.pbxproj
          xcodebuild -project Autumn.xcodeproj -list

      - name: Resolve Swift packages
        env:
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Autumn.xcodeproj \
            -scheme AutumnApp \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_P6Z72KS63T.p8" \
            -authenticationKeyID "P6Z72KS63T" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Archive
        env:
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KP="${KEYCHAIN_PASSWORD:-keychainpass}"
          security unlock-keychain -p "$KP" $RUNNER_TEMP/signing.keychain-db

          if [ -n "$PROFILE_UUID" ]; then
            echo "Manual signing — profile: $PROFILE_UUID"
            xcodebuild archive \
              -project Autumn.xcodeproj \
              -scheme AutumnApp \
              -configuration Release \
              -destination "generic/platform=iOS" \
              -archivePath "$RUNNER_TEMP/Autumn.xcarchive" \
              -allowProvisioningUpdates \
              -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_P6Z72KS63T.p8" \
              -authenticationKeyID "P6Z72KS63T" \
              -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
              CODE_SIGN_STYLE=Manual \
              PROVISIONING_PROFILE="$PROFILE_UUID" \
              DEVELOPMENT_TEAM=L7AHWS9Q6V \
              OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/signing.keychain-db"
          else
            echo "Automatic signing"
            xcodebuild archive \
              -project Autumn.xcodeproj \
              -scheme AutumnApp \
              -configuration Release \
              -destination "generic/platform=iOS" \
              -archivePath "$RUNNER_TEMP/Autumn.xcarchive" \
              -allowProvisioningUpdates \
              -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_P6Z72KS63T.p8" \
              -authenticationKeyID "P6Z72KS63T" \
              -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
              CODE_SIGN_STYLE=Automatic \
              DEVELOPMENT_TEAM=L7AHWS9Q6V \
              OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/signing.keychain-db"
          fi
          ls -la "$RUNNER_TEMP/Autumn.xcarchive"

      - name: Export IPA
        env:
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KP="${KEYCHAIN_PASSWORD:-keychainpass}"
          security unlock-keychain -p "$KP" $RUNNER_TEMP/signing.keychain-db
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Autumn.xcarchive" \
            -exportOptionsPlist "$GITHUB_WORKSPACE/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_P6Z72KS63T.p8" \
            -authenticationKeyID "P6Z72KS63T" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"
          find $RUNNER_TEMP/export -name '*.ipa'

      - name: Upload to TestFlight
        env:
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          IPA=$(find $RUNNER_TEMP/export -name '*.ipa' | head -1)
          echo "Uploading: $IPA"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "P6Z72KS63T" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --verbose

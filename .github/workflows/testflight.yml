name: Build & Deploy to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build Autumn iOS → TestFlight
    runs-on: macos-15
    timeout-minutes: 60

    env:
      BUNDLE_ID: DART-Meadow-LLC.Autumn
      TEAM_ID: L7AHWS9Q6V
      ARCHIVE_PATH: ${{ github.workspace }}/build/Autumn.xcarchive
      EXPORT_PATH: ${{ github.workspace }}/build/export

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Select Xcode ────────────────────────────────────────────────────
      - name: Select Xcode 16
        run: |
          sudo xcode-select -switch /Applications/Xcode_16.app
          xcodebuild -version

      # ── 3. Resolve SPM dependencies ────────────────────────────────────────
      - name: Resolve SPM dependencies
        run: swift package resolve

      # ── 4. Install App Store Connect API key ───────────────────────────────
      - name: Install App Store Connect API key
        env:
          ASC_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          ASC_KEY_ID:      ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$ASC_KEY_CONTENT" \
            > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      # ── 5. Install distribution certificate ───────────────────────────────
      - name: Install distribution certificate
        env:
          CERT_B64:      ${{ secrets.DISTRIBUTION_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DISTRIBUTION_CERT_PASSWORD }}
          KC_PASSWORD:   ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KC_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KC_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          printf '%s' "$CERT_B64" | base64 --decode > /tmp/dist.p12
          security import /tmp/dist.p12 \
            -k build.keychain \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KC_PASSWORD" build.keychain
          rm /tmp/dist.p12

      # ── 6. Install provisioning profile ───────────────────────────────────
      - name: Install provisioning profile
        env:
          PROFILE_B64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          printf '%s' "$PROFILE_B64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/Autumn_Distribution.mobileprovision

      # ── 7. Build & Archive via xcodebuild (SPM package, no .xcodeproj) ────
      - name: Build and archive
        run: |
          xcodebuild archive \
            -scheme AutumnApp \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="Autumn Distribution" \
            | xcpretty || true
          # Verify archive was created
          ls -la "$ARCHIVE_PATH"

      # ── 8. Export IPA ──────────────────────────────────────────────────────
      - name: Export IPA
        run: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>${TEAM_ID}</string>
            <key>signingStyle</key><string>manual</string>
            <key>uploadSymbols</key><true/>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>Autumn Distribution</string>
            </dict>
          </dict></plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath "$EXPORT_PATH" \
            | xcpretty || true

      # ── 9. Upload to TestFlight ────────────────────────────────────────────
      - name: Upload to TestFlight
        env:
          ASC_KEY_ID:     ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID:  ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$EXPORT_PATH/Autumn.ipa" \
            --apiKey  "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --verbose

      # ── 10. Save archive on failure for debugging ──────────────────────────
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Autumn-build-${{ github.run_number }}
          path: ${{ env.ARCHIVE_PATH }}
          retention-days: 7
          if-no-files-found: warn

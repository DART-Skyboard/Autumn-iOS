name: Build & Deploy to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger from GitHub Actions tab

jobs:
  build-and-deploy:
    name: Build Autumn iOS → TestFlight
    runs-on: macos-15   # Apple Silicon Mac runner with Xcode 16+
    timeout-minutes: 60

    env:
      SCHEME: AutumnApp
      BUNDLE_ID: DART-Meadow-LLC.Autumn
      TEAM_ID: L7AHWS9Q6V
      XCODE_PROJECT: Autumn.xcodeproj
      ARCHIVE_PATH: ${{ github.workspace }}/build/Autumn.xcarchive
      EXPORT_PATH: ${{ github.workspace }}/build/export

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Select Xcode version ────────────────────────────────────────────
      - name: Select Xcode 16
        run: sudo xcode-select -switch /Applications/Xcode_16.app

      # ── 3. Resolve Swift Package dependencies ─────────────────────────────
      - name: Resolve SPM dependencies
        run: |
          swift package resolve

      # ── 4. Generate Xcode project from Package.swift ──────────────────────
      - name: Generate Xcode project
        run: |
          swift package generate-xcodeproj
          ls -la

      # ── 5. Install App Store Connect API key ──────────────────────────────
      - name: Install App Store Connect API key
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          ASC_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_API_KEY_CONTENT" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8

      # ── 6. Install Distribution Certificate ───────────────────────────────
      - name: Install distribution certificate
        env:
          DIST_CERT_BASE64: ${{ secrets.DISTRIBUTION_CERT_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.DISTRIBUTION_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Decode and import the certificate
          echo "$DIST_CERT_BASE64" | base64 --decode > /tmp/distribution.p12
          security import /tmp/distribution.p12 \
            -k build.keychain \
            -P "$DIST_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

      # ── 7. Install Provisioning Profile ───────────────────────────────────
      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/Autumn_Distribution.mobileprovision

      # ── 8. Build & Archive ─────────────────────────────────────────────────
      - name: Build and archive
        run: |
          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="Autumn Distribution" \
            | xcpretty

      # ── 9. Export IPA ──────────────────────────────────────────────────────
      - name: Export IPA
        run: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>Autumn Distribution</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath "$EXPORT_PATH" \
            | xcpretty

      # ── 10. Upload to TestFlight ───────────────────────────────────────────
      - name: Upload to TestFlight
        env:
          ASC_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$EXPORT_PATH/Autumn.ipa" \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_ISSUER_ID" \
            --verbose

      # ── 11. Upload build artifacts (for debugging) ─────────────────────────
      - name: Upload archive artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Autumn-xcarchive
          path: ${{ env.ARCHIVE_PATH }}
          retention-days: 7

name: Build & Deploy to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build Autumn iOS to TestFlight
    runs-on: macos-14
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: |
          sudo xcode-select -switch /Applications/Xcode_15.4.app
          xcodebuild -version

      - name: Install App Store Connect API key
        env:
          ASC_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$ASC_KEY_CONTENT" > ~/.appstoreconnect/private_keys/AuthKey_P6Z72KS63T.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_P6Z72KS63T.p8

      - name: Setup signing keychain
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "keychainpass" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "keychainpass" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "keychainpass" "$KEYCHAIN_PATH" 2>/dev/null || true

      - name: Install pinned xcodegen
        run: |
          # Pin to 2.42.0 — generates project format 76 compatible with Xcode 15.4
          # xcodegen 2.43+ generates format 77 which Xcode 15.4 cannot open
          brew install xcodegen@2.42 2>/dev/null || \
          brew install xcodegen 2>/dev/null && \
          brew pin xcodegen || true
          # Try pinned version first, fall back to gem install
          if ! command -v xcodegen &>/dev/null; then
            gem install xcodegen -v 2.42.0 --no-document
          fi
          xcodegen version || true

      - name: Generate Xcode project
        run: |
          xcodegen generate --spec project.yml
          echo "=== Generated project ==="
          ls -la *.xcodeproj 2>/dev/null || true
          # Verify project format version
          grep -m1 "objectVersion" Autumn.xcodeproj/project.pbxproj || true

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Autumn.xcodeproj \
            -scheme AutumnApp \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_P6Z72KS63T.p8" \
            -authenticationKeyID "P6Z72KS63T" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Build and archive
        env:
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          security unlock-keychain -p "keychainpass" $RUNNER_TEMP/signing.keychain-db
          xcodebuild archive \
            -project Autumn.xcodeproj \
            -scheme AutumnApp \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/Autumn.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_P6Z72KS63T.p8" \
            -authenticationKeyID "P6Z72KS63T" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=L7AHWS9Q6V \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/signing.keychain-db" \
            | xcpretty || true
          # Verify archive was created
          ls -la "$RUNNER_TEMP/Autumn.xcarchive" || (echo "Archive not found!" && exit 1)

      - name: Export IPA
        env:
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          security unlock-keychain -p "keychainpass" $RUNNER_TEMP/signing.keychain-db
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Autumn.xcarchive" \
            -exportOptionsPlist "$GITHUB_WORKSPACE/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_P6Z72KS63T.p8" \
            -authenticationKeyID "P6Z72KS63T" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"
          echo "=== Exported IPA ==="
          find $RUNNER_TEMP/export -name '*.ipa' | head -3

      - name: Upload to TestFlight via altool
        env:
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          IPA=$(find $RUNNER_TEMP/export -name '*.ipa' | head -1)
          echo "Uploading: $IPA"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "P6Z72KS63T" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --verbose

name: Build & Deploy to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build Autumn iOS to TestFlight
    runs-on: macos-14
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: |
          sudo xcode-select -switch /Applications/Xcode_15.4.app 2>/dev/null || \
          sudo xcode-select -switch /Applications/Xcode_15.2.app 2>/dev/null || \
          sudo xcode-select -switch $(ls -d /Applications/Xcode*.app | head -1)
          xcodebuild -version
          xcodebuild -showsdks | grep iphoneos

      - name: Install App Store Connect API key
        env:
          ASC_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$ASC_KEY_CONTENT" > ~/.appstoreconnect/private_keys/AuthKey_P6Z72KS63T.p8
          head -1 ~/.appstoreconnect/private_keys/AuthKey_P6Z72KS63T.p8

      - name: Setup keychain and import distribution certificate
        env:
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASS="temppass123"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Use xcodebuild to register the key and fetch/create signing cert automatically
          # This triggers automatic cert creation via ASC API
          echo "Keychain created and set as default for signing"
          security list-keychains

      - name: Resolve SPM dependencies
        run: swift package resolve

      - name: Build and archive
        env:
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security unlock-keychain -p "temppass123" "$KEYCHAIN_PATH"

          xcodebuild archive \
            -scheme AutumnApp \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/Autumn.xcarchive" \
            -allowProvisioningUpdates \
            -allowProvisioningDeviceRegistration \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_P6Z72KS63T.p8" \
            -authenticationKeyID "P6Z72KS63T" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=L7AHWS9Q6V \
            PRODUCT_BUNDLE_IDENTIFIER=DART-Meadow-LLC.Autumn

      - name: Export IPA
        env:
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          cat > /tmp/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>L7AHWS9Q6V</string>
            <key>signingStyle</key><string>automatic</string>
            <key>uploadBitcode</key><false/>
            <key>uploadSymbols</key><true/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Autumn.xcarchive" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_P6Z72KS63T.p8" \
            -authenticationKeyID "P6Z72KS63T" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload to TestFlight
        env:
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          IPA=$(find $RUNNER_TEMP/export -name '*.ipa' | head -1)
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "P6Z72KS63T" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --verbose

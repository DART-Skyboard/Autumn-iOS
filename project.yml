name: Autumn
options:
  bundleIdPrefix: com.dartmeadow
  deploymentTarget:
    iOS: "16.0"
  generateEmptyDirectories: true
  xcodeVersion: "15.4"
  xcodeCompatibilityVersion: "Xcode 14.0"
packages:
  swift-markdown-ui:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"
targets:
  # ── LEATRCore — static library (no signing needed) ────────
  LEATRCore:
    type: framework
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Sources/LEATRCore
    settings:
      base:
        PRODUCT_NAME: LEATRCore
        SWIFT_VERSION: "5.9"
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
        GENERATE_INFOPLIST_FILE: YES

  # ── AutumnServices — framework (no signing needed) ────────
  AutumnServices:
    type: framework
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Sources/AutumnServices
    dependencies:
      - target: LEATRCore
    settings:
      base:
        PRODUCT_NAME: AutumnServices
        SWIFT_VERSION: "5.9"
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
        GENERATE_INFOPLIST_FILE: YES

  # ── AutumnApp — main application (signed) ─────────────────
  AutumnApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Sources/AutumnApp
    info:
      path: Sources/AutumnApp/Info.plist
    entitlements:
      path: Sources/AutumnApp/AutumnApp.entitlements
    dependencies:
      - target: LEATRCore
      - target: AutumnServices
      - package: swift-markdown-ui
        product: MarkdownUI
    settings:
      base:
        PRODUCT_NAME: Autumn
        PRODUCT_BUNDLE_IDENTIFIER: com.dartmeadow.autumn
        DEVELOPMENT_TEAM: L7AHWS9Q6V
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "iPhone Distribution"
        PROVISIONING_PROFILE: "97730134-ed09-4550-811e-7714a446eb79"
        PROVISIONING_PROFILE_SPECIFIER: "AutumnGitHubFlow"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_ENTITLEMENTS: Sources/AutumnApp/AutumnApp.entitlements
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
schemes:
  AutumnApp:
    build:
      targets:
        AutumnApp: all
        AutumnServices: all
        LEATRCore: all
    archive:
      config: Release

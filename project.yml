name: Autumn
options:
  bundleIdPrefix: com.dartmeadow
  deploymentTarget:
    iOS: "16.0"
  generateEmptyDirectories: true
  xcodeVersion: "15.4"
  xcodeCompatibilityVersion: "Xcode 14.0"
packages:
  swift-markdown-ui:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"
targets:
  # ── LEATRCore — static library (no signing needed) ────────
  LEATRCore:
    type: library.static
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Sources/LEATRCore
    settings:
      base:
        PRODUCT_NAME: LEATRCore
        SWIFT_VERSION: "5.9"
        DEFINES_MODULE: YES

  # ── AutumnServices — framework (no signing needed) ────────
  AutumnServices:
    type: library.static
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Sources/AutumnServices
    dependencies:
      - target: LEATRCore
    settings:
      base:
        PRODUCT_NAME: AutumnServices
        SWIFT_VERSION: "5.9"
        DEFINES_MODULE: YES

  # ── AutumnApp — main application (signed) ─────────────────
  AutumnApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Sources/AutumnApp
      - path: Sources/AutumnApp/PrivacyInfo.xcprivacy
        type: file
      - Sources/AutumnApp/Assets.xcassets
    info:
      path: Sources/AutumnApp/Info.plist
      properties:
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        UIRequiresFullScreen: false
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSupportsIndirectInputEvents: true
        NSMicrophoneUsageDescription: Voice input for AI conversation with Autumn
        NSSpeechRecognitionUsageDescription: Transcribe voice messages for the LEATR pipeline
        NSLocationWhenInUseUsageDescription: Used for contextual awareness in BRPN mapping
        NSContactsUsageDescription: Optional - connect with MIST session peers
        BGTaskSchedulerPermittedIdentifiers:
          - com.dartmeadow.autumn.reflex
          - com.dartmeadow.autumn.journal
          - com.dartmeadow.autumn.memory
        UIBackgroundModes:
          - fetch
          - processing
    entitlements:
      path: Sources/AutumnApp/AutumnApp.entitlements
    dependencies:
      - target: LEATRCore
      - target: AutumnServices
      - package: swift-markdown-ui
        product: MarkdownUI
    settings:
      base:
        PRODUCT_NAME: Autumn
        PRODUCT_BUNDLE_IDENTIFIER: com.dartmeadow.autumn
        DEVELOPMENT_TEAM: L7AHWS9Q6V
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "iPhone Distribution"
        PROVISIONING_PROFILE: "d5e965c9-84bd-4151-9157-785629bc3d1f"
        PROVISIONING_PROFILE_SPECIFIER: "AutumnGitHubFlow"
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: Sources/AutumnApp/AutumnApp.entitlements
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        CURRENT_PROJECT_VERSION: "26"
        MARKETING_VERSION: "1.0.0"
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
schemes:
  AutumnApp:
    build:
      targets:
        AutumnApp: all
        AutumnServices: all
        LEATRCore: all
    archive:
      config: Release
